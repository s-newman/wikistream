<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Wikistream</title>
</head>
<body>

<section>
    <table>
        <tr>
            <th>Page</th>
            <th>Edits</th>
        </tr>
        {% for page in pages %}
        <tr>
            <td><a href="{{ page.url }}">{{ page.title }}</a></td>
            <td>{{ page.edits }}</td>
        </tr>
        {% endfor %}
    </table>
</section>
<section>
    {% if previous_day is not none %}
    <a href="/?date={{ previous_day }}">&laquo; Previous Day</a>
    {% endif %}
    <span>{{ date }}</span>
    {% if next_day is not none %}
    <a href="/?date={{ next_day }}">Next Day &raquo;</a>
    {% endif %}
</section>
<section>
    <form action="/" method="get">
        <label for="date">Date</label>
        <input id="date" type="date" name="date" value="{{ date }}"/>
        <input type="submit" value="Check"/>
    </form>
</section>

</body>
</html>
